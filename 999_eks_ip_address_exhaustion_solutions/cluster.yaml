  #           --==BOUNDARY==
  #           Content-Type: application/node.eks.aws
            
  #           ---
  #           apiVersion: node.eks.aws/v1alpha1
  #           kind: NodeConfig
  #           spec:
  #             cluster:
  #               apiServerEndpoint: ${EksCluster.Endpoint}
  #               certificateAuthority: ${EksCluster.CertificateAuthorityData}
  #               cidr: 172.20.0.0/16
  #               name: ${EksCluster}

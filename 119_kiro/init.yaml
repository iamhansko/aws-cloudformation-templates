Parameters:
  InboundFromAnywhere:
    Type: String
    Default: "False"
    AllowedValues: ["True", "False"]
    Description: SecurityGroup Inbound Rule (Source 0.0.0.0/0)
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
Conditions:
  SecurityGroupInboundFromAnywhere: !Equals [!Ref InboundFromAnywhere, "True"]

Resources:
  IamIdentityCenterInstance:
    Type: AWS::SSO::Instance
  
  KiroUsername:
    Type: Custom::Parameter
    DependsOn: Ec2
    Properties:
      ServiceToken: !GetAtt GetParameterLambdaFunction.Arn
      ParameterName: /kiro/user/name
  KiroPassword:
    Type: Custom::Parameter
    DependsOn: Ec2
    Properties:
      ServiceToken: !GetAtt GetParameterLambdaFunction.Arn
      ParameterName: /kiro/user/password
  GetParameterLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: GetParameterStoreValue
      Runtime: python3.13
      Handler: index.lambda_handler
      Role: !GetAtt GetParameterLambdaIamRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import json
          
          def lambda_handler(event, context):
            print(f"Event : {json.dumps(event)}")
            response_data = {}
              
            try:
              request_type = event["RequestType"]
              parameter_name = event["ResourceProperties"].get("ParameterName", "")
                
              if not parameter_name:
                response_data["Reason"] = "No ParameterName"
                cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
                return
                
              ssm = boto3.client("ssm")
              if request_type == "Create" or request_type == "Update":
                try:
                  response = ssm.get_parameter(Name=parameter_name,WithDecryption=True)
                  response_data["Value"] = response["Parameter"]["Value"]
                  response_data["Type"] = response["Parameter"]["Type"]
                  response_data["Name"] = parameter_name
                  response_data["Message"] = f"{parameter_name}"
                except Exception as e:
                    response_data["Reason"] = str(e)
                    cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
                    return
              
              elif request_type == "Delete":
                response_data["Message"] = "Custom Resource Deleted"
                
              cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
            
            except Exception as e:
              response_data["Reason"] = str(e)
              cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
  GetParameterLambdaIamRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GetParameterLambdaIamPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: "*"
  
  KeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub
        - key-${Id}
        - Id: !Select [3, !Split ['-', !Select [2, !Split ['/', !Ref AWS::StackId]]]]
  
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: True
      EnableDnsHostnames: True
      Tags:
        - Key: Name
          Value: vpc
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      AvailabilityZone: !Sub ${AWS::Region}a
      CidrBlock: 10.0.0.0/24
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: public-subnet-a
      VpcId: !Ref Vpc
  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicSubnetRouteTable
      SubnetId: !Ref PublicSubnetA
  PublicSubnetRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      Tags:
        - Key: Name
          Value: public-rt
      VpcId: !Ref Vpc
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: igw
  VpcInternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref Vpc
  PublicSubnetRoute:
    Type: AWS::EC2::Route
    DependsOn:
      - VpcInternetGatewayAttachment
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway
      RouteTableId: !Ref PublicSubnetRouteTable
  
  Ec2:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Count: '1'                
        Timeout: PT7M
    Properties:
      ImageId: !Ref AmiId
      InstanceType: t3.large
      KeyName: !Ref KeyPair
      NetworkInterfaces: 
        - AssociatePublicIpAddress: True
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnetA
          GroupSet: 
            - !Ref Ec2SecurityGroup
      Tags: 
        - Key: Name
          Value: ec2
      IamInstanceProfile: !Ref Ec2InstanceProfile
      UserData: 
        # sudo tail -f /var/log/cloud-init-output.log
        Fn::Base64: !Sub |
          #!/bin/bash
          set -x

          dnf update -yq
          dnf install -yq git
          dnf groupinstall -yq "Development Tools"

          export VSC_VERSION="4.102.3"
          wget https://github.com/coder/code-server/releases/download/v$VSC_VERSION/code-server-$VSC_VERSION-linux-amd64.tar.gz
          tar -xzf code-server-$VSC_VERSION-linux-amd64.tar.gz
          mv code-server-$VSC_VERSION-linux-amd64 /usr/local/lib/code-server
          ln -s /usr/local/lib/code-server/bin/code-server /usr/local/bin/code-server
          mkdir -p /home/ec2-user/.config/code-server
          cat <<EOF > /home/ec2-user/.config/code-server/config.yaml
          bind-addr: 0.0.0.0:8000
          auth: none
          cert: false
          EOF
          chown -R ec2-user:ec2-user /home/ec2-user/.config
          cat <<EOF > /etc/systemd/system/code-server.service
          [Unit]
          Description=VS Code Server
          After=network.target
          [Service]
          Type=simple
          User=ec2-user
          ExecStart=/usr/local/bin/code-server --config /home/ec2-user/.config/code-server/config.yaml /home/ec2-user
          Restart=always
          [Install]
          WantedBy=multi-user.target
          EOF
          systemctl daemon-reload
          systemctl enable code-server
          systemctl start code-server

          IMDS_TOKEN=$(curl -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" -s)
          if [ -z "$IMDS_TOKEN" ]; then
            echo "Failed to get IMDSv2 token"
            exit 1
          fi
          export ROLE_NAME=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/iam/security-credentials/)
          export CREDENTIALS=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/iam/security-credentials/$ROLE_NAME)
          export AWS_DEFAULT_REGION=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/placement/region)
          export AWS_ACCESS_KEY_ID=$(echo "$CREDENTIALS" | jq -r '.AccessKeyId')
          export AWS_SECRET_ACCESS_KEY=$(echo "$CREDENTIALS" | jq -r '.SecretAccessKey')
          export AWS_SESSION_TOKEN=$(echo "$CREDENTIALS" | jq -r '.Token')

          echo "AwsDefaultRegion : $AWS_DEFAULT_REGION"
          echo "AwsSecretAccessKey : $AWS_SECRET_ACCESS_KEY"
          echo "AwsSessionToken : $AWS_SESSION_TOKEN"
          aws sts get-caller-identity

          SERVICE="sso"
          HOST="sso.$AWS_DEFAULT_REGION.amazonaws.com"
          ENDPOINT="https://$HOST/control/"
          REQUEST_METHOD="POST"
          CONTENT_TYPE="application/x-amz-json-1.1"
          AMZ_TARGET="SWBService.UpdateSsoConfiguration"
          AMZ_USER_AGENT="aws-sdk-js/2.1467.0 promise"
          IAM_IDENTITY_CENTER_INSTANCE_ARN="${IamIdentityCenterInstance.InstanceArn}"
          REQUEST_BODY='{"instanceArn":"'"$IAM_IDENTITY_CENTER_INSTANCE_ARN"'","configurationType":"APP_AUTHENTICATION_CONFIGURATION","ssoConfiguration":{"mfaMode":"DISABLED"}}'
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          DATESTAMP=$(date -u +"%Y%m%d")
          function hash_sha256 {
            echo -n "$1" | openssl dgst -sha256 -binary | xxd -p -c 256
          }
          function hmac_sha256 {
            key="$1"
            data="$2"
            echo -n "$data" | openssl dgst -sha256 -mac HMAC -macopt "$key" -binary
          }
          PAYLOAD_HASH=$(hash_sha256 "$REQUEST_BODY")
          CANONICAL_URI="/control/"
          CANONICAL_QUERYSTRING=""
          CANONICAL_HEADERS="host:$HOST
          x-amz-content-sha256:$PAYLOAD_HASH
          x-amz-date:$TIMESTAMP
          x-amz-security-token:$AWS_SESSION_TOKEN
          x-amz-target:$AMZ_TARGET
          x-amz-user-agent:$AMZ_USER_AGENT"
          SIGNED_HEADERS="host;x-amz-content-sha256;x-amz-date;x-amz-security-token;x-amz-target;x-amz-user-agent"
          CANONICAL_REQUEST="$REQUEST_METHOD
          $CANONICAL_URI
          $CANONICAL_QUERYSTRING
          $CANONICAL_HEADERS

          $SIGNED_HEADERS
          $PAYLOAD_HASH"
          CANONICAL_REQUEST_HASH=$(hash_sha256 "$CANONICAL_REQUEST")
          ALGORITHM="AWS4-HMAC-SHA256"
          CREDENTIAL_SCOPE="$DATESTAMP/$AWS_DEFAULT_REGION/$SERVICE/aws4_request"
          STRING_TO_SIGN="$ALGORITHM
          $TIMESTAMP
          $CREDENTIAL_SCOPE
          $CANONICAL_REQUEST_HASH"
          kDate=$(echo -n "$DATESTAMP" | openssl dgst -sha256 -mac HMAC -macopt "key:AWS4$AWS_SECRET_ACCESS_KEY" -binary | xxd -p -c 256)
          kRegion=$(echo -n "$AWS_DEFAULT_REGION" | openssl dgst -sha256 -mac HMAC -macopt "hexkey:$kDate" -binary | xxd -p -c 256)
          kService=$(echo -n "$SERVICE" | openssl dgst -sha256 -mac HMAC -macopt "hexkey:$kRegion" -binary | xxd -p -c 256)
          kSigning=$(echo -n "aws4_request" | openssl dgst -sha256 -mac HMAC -macopt "hexkey:$kService" -binary | xxd -p -c 256)
          SIGNATURE=$(echo -n "$STRING_TO_SIGN" | openssl dgst -sha256 -mac HMAC -macopt "hexkey:$kSigning" | sed 's/^.* //')
          AUTHORIZATION_HEADER="$ALGORITHM Credential=$AWS_ACCESS_KEY_ID/$CREDENTIAL_SCOPE, SignedHeaders=$SIGNED_HEADERS, Signature=$SIGNATURE"
          curl -X POST "$ENDPOINT" \
          -H "Content-Type: $CONTENT_TYPE" \
          -H "X-Amz-User-Agent: $AMZ_USER_AGENT" \
          -H "X-Amz-Target: $AMZ_TARGET" \
          -H "X-Amz-Content-Sha256: $PAYLOAD_HASH" \
          -H "X-Amz-Date: $TIMESTAMP" \
          -H "X-Amz-Security-Token: $AWS_SESSION_TOKEN" \
          -H "Authorization: $AUTHORIZATION_HEADER" \
          --data-raw "$REQUEST_BODY"

          export IDENTITY_STORE_ID="${IamIdentityCenterInstance.IdentityStoreId}"
          export USER_ID=$(aws identitystore create-user \
          --identity-store-id $IDENTITY_STORE_ID \
          --user-name kiro \
          --name "GivenName=Kiro,FamilyName=User" \
          --display-name "Kiro User" \
          --emails "Type=work,Value=pro@kiro.com" \
          --query "UserId" | tr -d '"')

          SERVICE="userpool"
          HOST="identitystore.$AWS_DEFAULT_REGION.amazonaws.com"
          ENDPOINT="https://$HOST/"
          REQUEST_METHOD="POST"
          CONTENT_TYPE="application/x-amz-json-1.0"
          AMZ_TARGET="SWBUPService.UpdatePassword"
          AMZ_USER_AGENT="aws-sdk-js/2.1467.0 promise"
          REQUEST_BODY='{"UserId":"'$USER_ID'","PasswordMode":"OTP"}'

          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          DATESTAMP=$(date -u +"%Y%m%d")
          function hash_sha256 {
            echo -n "$1" | openssl dgst -sha256 -binary | xxd -p -c 256
          }
          function hmac_sha256 {
            key="$1"
            data="$2"
            echo -n "$data" | openssl dgst -sha256 -mac HMAC -macopt "$key" -binary
          }
          PAYLOAD_HASH=$(hash_sha256 "$REQUEST_BODY")
          CANONICAL_URI="/"
          CANONICAL_QUERYSTRING=""
          CANONICAL_HEADERS="host:$HOST
          x-amz-content-sha256:$PAYLOAD_HASH
          x-amz-date:$TIMESTAMP
          x-amz-security-token:$AWS_SESSION_TOKEN
          x-amz-target:$AMZ_TARGET
          x-amz-user-agent:$AMZ_USER_AGENT"
          SIGNED_HEADERS="host;x-amz-content-sha256;x-amz-date;x-amz-security-token;x-amz-target;x-amz-user-agent"
          CANONICAL_REQUEST="$REQUEST_METHOD
          $CANONICAL_URI
          $CANONICAL_QUERYSTRING
          $CANONICAL_HEADERS

          $SIGNED_HEADERS
          $PAYLOAD_HASH"
          CANONICAL_REQUEST_HASH=$(hash_sha256 "$CANONICAL_REQUEST")
          ALGORITHM="AWS4-HMAC-SHA256"
          CREDENTIAL_SCOPE="$DATESTAMP/$AWS_DEFAULT_REGION/$SERVICE/aws4_request"
          STRING_TO_SIGN="$ALGORITHM
          $TIMESTAMP
          $CREDENTIAL_SCOPE
          $CANONICAL_REQUEST_HASH"
          kDate=$(echo -n "$DATESTAMP" | openssl dgst -sha256 -mac HMAC -macopt "key:AWS4$AWS_SECRET_ACCESS_KEY" -binary | xxd -p -c 256)
          kRegion=$(echo -n "$AWS_DEFAULT_REGION" | openssl dgst -sha256 -mac HMAC -macopt "hexkey:$kDate" -binary | xxd -p -c 256)
          kService=$(echo -n "$SERVICE" | openssl dgst -sha256 -mac HMAC -macopt "hexkey:$kRegion" -binary | xxd -p -c 256)
          kSigning=$(echo -n "aws4_request" | openssl dgst -sha256 -mac HMAC -macopt "hexkey:$kService" -binary | xxd -p -c 256)
          SIGNATURE=$(echo -n "$STRING_TO_SIGN" | openssl dgst -sha256 -mac HMAC -macopt "hexkey:$kSigning" | sed 's/^.* //')
          AUTHORIZATION_HEADER="$ALGORITHM Credential=$AWS_ACCESS_KEY_ID/$CREDENTIAL_SCOPE, SignedHeaders=$SIGNED_HEADERS, Signature=$SIGNATURE"
          export OTP=$(curl -X $REQUEST_METHOD "$ENDPOINT" \
          -s \
          -H "Content-Type: $CONTENT_TYPE" \
          -H "X-Amz-User-Agent: $AMZ_USER_AGENT" \
          -H "X-Amz-Target: $AMZ_TARGET" \
          -H "X-Amz-Content-Sha256: $PAYLOAD_HASH" \
          -H "X-Amz-Date: $TIMESTAMP" \
          -H "X-Amz-Security-Token: $AWS_SESSION_TOKEN" \
          -H "Authorization: $AUTHORIZATION_HEADER" \
          --data-raw "$REQUEST_BODY" | jq ".Password" | tr -d '"')
          
          echo "UserID : $USER_ID"
          echo "OneTimePassword : $OTP"

          aws ssm put-parameter --name "/kiro/user/password" --value $OTP --type String
          aws ssm put-parameter --name "/kiro/user/name" --value "kiro" --type String

          su - ec2-user << EOF
          set -x 
          curl -L -O https://github.com/iamhansko/kiroctl/releases/download/v0.0/kiroctl
          chmod +x ./kiroctl
          mkdir -p /home/ec2-user/bin && cp ./kiroctl /home/ec2-user/bin/kiroctl && export PATH=/home/ec2-user/bin:\$PATH
          echo 'export PATH=/home/ec2-user/bin:\$PATH' >> ~/.bashrc
          rm -f ./kiroctl
          kiroctl profile create --region us-east-1
          sleep 20
          for i in {1..3}; do
            kiroctl user subscribe --region us-east-1 --plan Q_DEVELOPER_STANDALONE_PRO $USER_ID
            sleep 5
          done
          EOF

          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource Ec2 --region ${AWS::Region}
  Ec2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group
      GroupName: ec2-sg
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        !If [SecurityGroupInboundFromAnywhere, [{
          "IpProtocol": "tcp",
          "FromPort": 8000,
          "ToPort": 8000,
          "CidrIp": "0.0.0.0/0"
        }], []]
      Tags:
        - Key: Name
          Value: ec2-sg
  Ec2IamRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess
        - arn:aws:iam::aws:policy/AmazonQDeveloperAccess
      Policies:
        - PolicyName: KiroIamPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - q:*
                  - codewhisperer:*
                  - user-subscriptions:*
                Resource: "*"
  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: 
        - !Ref Ec2IamRole
  TerminateInstance:
    Type: Custom::TerminateInstance
    Properties:
      ServiceToken: !GetAtt TerminateInstanceLambdaFunction.Arn
      InstanceId: !Ref Ec2
  TerminateInstanceLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.13
      Handler: index.lambda_handler
      Role: !GetAtt TerminateInstanceLambdaIamRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import json
          
          def lambda_handler(event, context):
            print(f"Event : {json.dumps(event)}")  
            response_data = {}
              
            try:
              request_type = event["RequestType"]
              instance_id = event["ResourceProperties"].get("InstanceId", "")
              
              if not instance_id:
                response_data["Reason"] = "No EC2 Instance ID"
                cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
                return
                  
              ec2 = boto3.client("ec2")    
              if request_type == "Create" or request_type == "Update":
                try:
                  response = ec2.describe_instances(InstanceIds=[instance_id])
                  instances = response["Reservations"][0]["Instances"]
                  instance_state = instances[0]["State"]["Name"]
                  if instance_state not in ["terminated", "terminating"]:
                    terminate_response = ec2.terminate_instances(InstanceIds=[instance_id])
                    response_data["Message"] = f"{instance_id} Termination Requested"
                    response_data["PreviousState"] = instance_state
                  else:
                    response_data["Message"] = f"{instance_id}"
                    response_data["PreviousState"] = instance_state
                except Exception as e:
                  response_data["Reason"] = str(e)
                  cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
                  return
              elif request_type == "Delete":
                response_data["Message"] = "Custom Resource Deleted"
              
              cfnresponse.send(event, context, cfnresponse.SUCCESS, response_data)
              
            except Exception as e:
              response_data["Reason"] = str(e)
              cfnresponse.send(event, context, cfnresponse.FAILED, response_data)
  TerminateInstanceLambdaIamRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TerminateInstanceLambdaIamPolicy
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - ec2:TerminateInstances
                  - ec2:DescribeInstances
                Resource: "*"

Outputs:
  01KiroLoginUrl:
    Description: Kiro Login URL
    Value: !Sub https://${IamIdentityCenterInstance.IdentityStoreId}.awsapps.com/start
  02KiroUsername:
    Description: Kiro Username
    Value: !GetAtt KiroUsername.Value
  03KiroPassword:
    Description: Kiro Password
    Value: !GetAtt KiroPassword.Value